name: tacoda-org
version: 0.3.0
tier: org
keystone_min: 0.12.0
description: |
  Example org-wide Keystone policy for tacoda projects. Demonstrates all four
  policy components (corpus, guides, playbooks, actions), the `strict`
  override-block, and the `required` gap-surfacing field. Layered on top of
  the universal baseline that ships with keystone; intended to be layered
  under team-level policies like tacoda-team.

# Items below are locked at this tier — no team or project file may override.
strict:
  guides:
    - documentation
    - todos
  actions:
    - changelog-check
    - static-analysis

# Items every install should have somewhere in the cascade. tacoda-org does
# not ship them; the project (or a team policy) must define them. Verify
# surfaces unmet ones as advisory gaps.
required:
  actions:
    - release-notes
